<div class="orientation-overlay" *ngIf="shouldShowOverlay()">
  <div class="orientation-content">
    <div class="phone-icon-container">
      <div class="phone-icon rotating">📱</div>
      <div class="arrow-icon">↻</div>
    </div>
    <h2 class="orientation-title">Rota tu dispositivo</h2>
    <p class="orientation-text">
      Por favor, gira tu dispositivo a posición horizontal para una mejor experiencia
    </p>
  </div>
</div>
